<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hizliyim.com - HizliyimSystem v4.9.1</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React ve ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-blue: #027AFF;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden; 
            overflow-y: auto;
            color: white;
            background: black;
        }

        /* --- GECE MODU ARKAPLAN VE EFEKTLER BALIM --- */
        .bg-gradient-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #000000 0%, #05051a 50%, #000814 100%);
            z-index: -5;
        }

        #static-stars-container, #night-effects-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -4;
        }

        .static-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.9; }
        }

        .shooting-star {
            position: absolute;
            width: 100px; height: 1px;
            background: linear-gradient(90deg, transparent, white, transparent);
            transform: rotate(-45deg);
            opacity: 0;
            animation: shoot linear forwards;
        }
        @keyframes shoot {
            0% { transform: translate(0,0) rotate(-45deg); opacity: 1; }
            100% { transform: translate(-400px, 400px) rotate(-45deg); opacity: 0; }
        }

        /* --- LOGO VE BAŞLIK EFEKTLERİ BALIM --- */
        .logo-img {
            filter: invert(1) drop-shadow(0 0 10px rgba(255,255,255,0.7));
            animation: logoPulse 3s infinite ease-in-out;
            object-contain: contain;
        }

        @keyframes logoPulse {
            0%, 100% { filter: invert(1) drop-shadow(0 0 5px rgba(255,255,255,0.3)); opacity: 0.8; transform: scale(1); }
            50% { filter: invert(1) drop-shadow(0 0 20px rgba(0, 243, 255, 0.8)); opacity: 1; transform: scale(1.05); }
        }

        .animated-title {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            letter-spacing: -1px;
            text-align: center;
        }

        .login-title-effect {
            background: linear-gradient(to right, #ffffff 0%, #00f3ff 50%, #ffffff 100%);
            background-size: 200% auto;
            color: #fff;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineMove 3s linear infinite;
        }

        .dashboard-title-effect {
            color: #fff;
            animation: intensePulse 3s infinite ease-in-out;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes shineMove {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }
        
        @keyframes intensePulse {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
            50% { text-shadow: 0 0 25px rgba(2, 122, 255, 0.8), 0 0 50px rgba(2, 122, 255, 0.4); }
        }

        /* --- MENÜ KARTI --- */
        .glass-panel {
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 1.5rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 50;
            transition: all 0.5s ease;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(0, 60, 180, 0.65), rgba(0, 30, 120, 0.65));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .custom-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 14px 20px;
            border-radius: 16px;
            outline: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }
        .custom-input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #4da3ff;
            box-shadow: 0 0 15px rgba(2, 122, 255, 0.2);
        }

        .action-btn {
            width: 100%; font-weight: 800; padding: 16px;
            border-radius: 16px; border: none; cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
            font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); margin-top: 10px;
            background: #ffffff; color: #027AFF;
        }
        .action-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* --- ANİMASYONLAR BALIM --- */
        .animate-pop-in { animation: popIn 0.5s ease-out forwards; }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-slide-down {
            animation: slideDownFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideDownFade {
            0% { opacity: 0; transform: translateY(-100px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .slide-out-left {
            animation: slideOutLeft 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideOutLeft {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(-150px); opacity: 0; }
        }

        .slide-in-right {
            animation: slideInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideInRight {
            0% { transform: translateX(150px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        @keyframes starPop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.4); opacity: 1; box-shadow: 0 0 15px #00f3ff; }
            100% { transform: scale(1); opacity: 1; box-shadow: 0 0 8px #fff; }
        }
        .animate-star-pop {
            animation: starPop 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .static-glow {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            display: inline-block;
        }

        .static-overload-glow {
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.8);
            display: inline-block;
            animation: overloadPulse 2s infinite alternate;
        }
        @keyframes overloadPulse {
            0% { text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
            100% { text-shadow: 0 0 35px rgba(239, 68, 68, 1); }
        }

        .overload-panel {
            border-color: rgba(239, 68, 68, 0.8) !important;
            box-shadow: 0 0 50px rgba(239, 68, 68, 0.4) !important;
            animation: panelPulse 2s infinite;
        }
        @keyframes panelPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(239, 68, 68, 0.3); }
            50% { box-shadow: 0 0 60px rgba(239, 68, 68, 0.6); border-color: rgba(239, 68, 68, 1); }
        }

        /* --- SİSTEM BARI BALIM --- */
        .scan-bar-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: transparent;
            overflow: hidden;
            z-index: 100;
        }
        .scan-bar-indicator {
            position: absolute;
            top: 0; left: 0; height: 100%; width: 25%;
            border-radius: 4px;
            animation: scanMove 2s ease-in-out infinite alternate;
            will-change: transform;
        }
        @keyframes scanMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        /* --- KAYDIRMA EFEKTİ BALIM --- */
        .slide-text-gradient {
            background: linear-gradient(to right, rgba(255,255,255,0.3) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,0.3) 100%);
            background-size: 200% auto;
            color: #fff;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineMove 3s linear infinite;
        }

        .swipe-hidden-input {
            position: absolute !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
            opacity: 0 !important;
            cursor: pointer !important;
            z-index: 20 !important;
        }
        .swipe-hidden-input::-webkit-slider-thumb {
            -webkit-appearance: none !important;
            width: 80px !important;
            height: 80px !important;
        }
        .swipe-hidden-input::-webkit-slider-runnable-track {
            height: 100% !important;
            background: transparent !important;
        }

        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px;
            border-radius: 50%; background: #ffffff;
            cursor: pointer; margin-top: -8px; box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer;
            background: rgba(255,255,255,0.2); border-radius: 2px;
        }
    </style>
</head>
<body class="night-mode">

    <!-- Efekt Konteynerları -->
    <div class="bg-gradient-overlay"></div>
    <div id="static-stars-container"></div>
    <div id="night-effects-container"></div>

    <div class="min-h-screen w-full flex flex-col justify-center items-center py-12 px-4">
        <div id="root" class="w-full max-w-[480px]"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // GECE EFEKTLERİ BALIM
        let shootingStarInterval;
        function initNightEffects() {
            const nightContainer = document.getElementById('night-effects-container');
            const staticContainer = document.getElementById('static-stars-container');
            nightContainer.innerHTML = ''; staticContainer.innerHTML = ''; 

            shootingStarInterval = setInterval(() => {
                const el = document.createElement('div');
                el.classList.add('shooting-star');
                el.style.top = Math.random() * 50 + '%';
                el.style.left = Math.random() * 100 + '%';
                nightContainer.appendChild(el);
                setTimeout(() => el.remove(), 2100);
            }, 2500);

            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.classList.add('static-star');
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                const size = Math.random() * 2 + 1; 
                star.style.width = `${size}px`; star.style.height = `${size}px`;
                star.style.animationDuration = `${Math.random() * 3 + 2}s`; 
                staticContainer.appendChild(star);
            }
        }

        // AKILLI SAYI BİLEŞENİ BALIM
        const AnimatedNumber = ({ value, decimals = 0 }) => {
            const [displayValue, setDisplayValue] = useState(value);
            useEffect(() => {
                let start = displayValue;
                let end = value;
                if (start === end) return;
                const duration = 1200; 
                const startTime = performance.now();
                const animate = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const ease = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                    const current = start + (end - start) * ease;
                    setDisplayValue(current);
                    if (progress < 1) requestAnimationFrame(animate);
                    else setDisplayValue(end);
                };
                requestAnimationFrame(animate);
            }, [value]);
            return <>{Number(displayValue).toLocaleString('tr-TR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals })}</>;
        };

        const App = () => {
            const [view, setView] = useState('login');
            const [user, setUser] = useState({ email: '', pass: '' });
            const [loading, setLoading] = useState(false);
            const [loginError, setLoginError] = useState(''); 
            const [isExiting, setIsExiting] = useState(false);
            
            const [sliderValue, setSliderValue] = useState(0);
            const [altLoginState, setAltLoginState] = useState('idle'); 
            const [passcode, setPasscode] = useState(''); 
            const passcodeRef = useRef(null); 

            // HAFIZADAN ÇEKME BALIM
            const savedUsers = Number(localStorage.getItem('hizliyim_users')) || 8400;
            const savedCpu = Number(localStorage.getItem('hizliyim_cpu')) || 40;
            const savedRam = Number(localStorage.getItem('hizliyim_ram')) || 37;
            const savedAnnouncement = localStorage.getItem('hizliyim_announcement') || "Sistem v4.9.1 güncellendi, her şey hatırlanıyor balımmmm.";

            const [activeUsers, setActiveUsers] = useState(savedUsers);
            const [baseCount, setBaseCount] = useState(savedUsers);
            const [cpu, setCpu] = useState(savedCpu);
            const [ram, setRam] = useState(savedRam);
            const [baseCpu, setBaseCpu] = useState(savedCpu); 
            const [baseRam, setBaseRam] = useState(savedRam); 
            const [announcement, setAnnouncement] = useState(savedAnnouncement);
            const [showAccountMenu, setShowAccountMenu] = useState(false);
            const [showSettings, setShowSettings] = useState(false);

            // HAFIZAYA KAYDETME BALIM
            useEffect(() => {
                localStorage.setItem('hizliyim_users', baseCount);
                localStorage.setItem('hizliyim_cpu', baseCpu);
                localStorage.setItem('hizliyim_ram', baseRam);
                localStorage.setItem('hizliyim_announcement', announcement);
            }, [baseCount, baseCpu, baseRam, announcement]);

            useEffect(() => {
                initNightEffects();
                return () => clearInterval(shootingStarInterval);
            }, []);

            useEffect(() => {
                const interval = setInterval(() => {
                    const noise = Math.floor(Math.random() * 100) - 50;
                    setActiveUsers(prev => {
                        let val = baseCount + noise;
                        if(val > 40000) val = 40000;
                        if(val < 0) val = 0;
                        return val;
                    });
                    setCpu(Math.max(5, Math.min(99, baseCpu + (Math.random() * 2 - 1))));
                    setRam(Math.max(10, Math.min(99, baseRam + (Math.random() * 2 - 1))));
                }, 2500);
                return () => clearInterval(interval);
            }, [baseCount, baseCpu, baseRam]);

            const handleLogin = (e) => {
                e.preventDefault();
                setLoading(true);
                setLoginError(''); 
                setTimeout(() => {
                    if (user.email === 'root' && user.pass === 'iremim') {
                        setLoading(false);
                        setIsExiting(true); 
                        setTimeout(() => { setView('dashboard'); setIsExiting(false); }, 600); 
                    } else {
                        setLoginError('Hatalı ID veya Şifre balımmmm!');
                        setLoading(false);
                    }
                }, 800);
            };

            const handlePasscodeChange = (e) => {
                const val = e.target.value.replace(/[^0-9]/g, ''); 
                if (val.length <= 4) setPasscode(val);
                if (val.length === 4 && passcodeRef.current) passcodeRef.current.blur();
            };

            const handleSliderChange = (e) => {
                if (altLoginState !== 'idle') return;
                const val = Number(e.target.value);
                setSliderValue(val);
                if (val >= 99) {
                    setAltLoginState('loading');
                    setSliderValue(100);
                    setTimeout(() => {
                        if (passcode === '0000') {
                            setAltLoginState('success');
                            setTimeout(() => {
                                setIsExiting(true);
                                setTimeout(() => {
                                    setView('dashboard');
                                    setIsExiting(false);
                                    setTimeout(() => { setAltLoginState('idle'); setSliderValue(0); setPasscode(''); }, 500);
                                }, 600);
                            }, 1000); 
                        } else {
                            setAltLoginState('error');
                            setTimeout(() => { setAltLoginState('idle'); setSliderValue(0); setPasscode(''); }, 1500); 
                        }
                    }, 2000); 
                }
            };

            const isOverload = activeUsers > 20000; 
            const applyMode = (users, c, r) => { setBaseCount(users); setBaseCpu(c); setBaseRam(r); };

            return (
                <div className="w-full relative z-10">
                    {view === 'login' && (
                        <div className={`glass-panel text-center items-center sm:p-12 p-8 ${isExiting ? 'slide-out-left' : 'animate-slide-down'}`}>
                            {/* LOGON BURADA BALIM - GİTHUB YOLU ./logo.png YAPILDI */}
                            <img 
                                src="./logo.png" 
                                alt="logo" 
                                className="w-20 h-20 mb-6 logo-img" 
                                onError={(e) => { e.target.style.display='none'; }}
                            />
                            <h1 className="animated-title login-title-effect text-4xl mb-8">hizliyim.com</h1>
                            
                            {loginError && <div className="w-full bg-red-500/20 border border-red-500/50 text-red-200 p-3 rounded-xl mb-4 text-sm font-bold animate-pulse">{loginError}</div>}

                            <form onSubmit={handleLogin} className="w-full space-y-4">
                                <input type="text" placeholder="Yönetici Kimliği" className="custom-input" required value={user.email} onChange={e => setUser({...user, email: e.target.value})} autoCapitalize="none" autoCorrect="off" spellCheck="false" />
                                <input type="password" placeholder="Güvenlik Şifresi" className="custom-input" required value={user.pass} onChange={e => setUser({...user, pass: e.target.value})} />
                                <button type="submit" className="action-btn">{loading ? "Doğrulanıyor..." : "Giriş Yap"}</button>
                            </form>
                            
                            <div className="w-full mt-6 pt-6 border-t border-white/10">
                                <button onClick={() => { setIsExiting(true); setTimeout(() => { setView('alt-login'); setIsExiting(false); }, 600); }} className="text-[10px] font-bold text-white/50 hover:text-[#027AFF] uppercase tracking-widest transition-colors flex items-center justify-center gap-2 mx-auto">Alternatif Yöntemler</button>
                            </div>
                        </div>
                    )}
                    
                    {view === 'alt-login' && (
                        <div className={`glass-panel text-center items-center sm:p-12 p-8 ${isExiting ? 'slide-out-left' : 'slide-in-right'}`}>
                            <button onClick={() => { setIsExiting(true); setTimeout(() => { setView('login'); setIsExiting(false); }, 600); }} className="absolute top-6 left-6 text-white/50 hover:text-[#027AFF] transition-colors"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg></button>
                            <div className="w-16 h-16 bg-[#027AFF]/10 border border-[#027AFF]/30 rounded-full flex items-center justify-center mx-auto mb-6 text-[#027AFF]"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></div>
                            <h2 className="text-xl font-black italic mb-3">Cihaz Kimliği İle Giriş</h2>
                            <p className="text-[10px] font-medium text-white/50 leading-relaxed mb-6 px-4">Sistem protokolü gereği donanım kimliği taranacaktır. Verileriniz passcode ile korunur.</p>

                            <div className="mb-10 w-full max-w-[200px] mx-auto relative">
                                <p className="text-[9px] font-bold uppercase tracking-widest text-white/40 mb-4 text-center">Passcode</p>
                                <div className="flex justify-center gap-4 relative z-10">
                                    <input ref={passcodeRef} type="tel" inputMode="numeric" maxLength="4" className="absolute inset-0 w-full h-full opacity-0 z-20 cursor-text" value={passcode} onChange={handlePasscodeChange} disabled={altLoginState !== 'idle'} />
                                    {[0, 1, 2, 3].map((index) => (
                                        <div key={index} className="w-5 h-5 rounded-full bg-black/40 border border-white/20 flex items-center justify-center transition-all duration-300">
                                            {passcode.length > index && <div className="w-2.5 h-2.5 bg-white rounded-full animate-star-pop"></div>}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="relative w-full h-14 bg-black/40 rounded-full border border-white/10 overflow-hidden flex items-center shadow-inner">
                                {altLoginState === 'idle' && (
                                    <>
                                        <span className="absolute w-full text-center text-[10px] font-black slide-text-gradient pointer-events-none tracking-widest pl-8">GİRİŞ İÇİN KAYDIRIN &gt;&gt;</span>
                                        <div className="absolute left-0 top-0 h-full bg-gradient-to-r from-[#027AFF]/40 via-[#027AFF]/70 to-[#00f3ff] backdrop-blur-md shadow-[-20px_0_25px_rgba(0,243,255,0.8)] rounded-full z-0" 
                                             style={{ width: `calc(56px + ${sliderValue}% - ${sliderValue * 0.56}px)`, transition: sliderValue === 0 ? 'width 0.5s cubic-bezier(0.16, 1, 0.3, 1)' : 'none' }}></div>
                                        <input type="range" min="0" max="100" value={sliderValue} onChange={handleSliderChange} onMouseUp={() => sliderValue < 99 && setSliderValue(0)} onTouchEnd={() => sliderValue < 99 && setSliderValue(0)} className="swipe-hidden-input" />
                                        <div className="absolute h-[48px] w-[48px] bg-white rounded-full flex items-center justify-center shadow-lg pointer-events-none z-10"
                                             style={{ left: `calc(4px + ${sliderValue}% - ${sliderValue * 0.56}px)`, top: '4px', transition: sliderValue === 0 ? 'left 0.5s cubic-bezier(0.16, 1, 0.3, 1)' : 'none' }}>
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#027AFF" strokeWidth="3"><polyline points="9 18 15 12 9 6"></polyline></svg>
                                        </div>
                                    </>
                                )}
                                {altLoginState === 'loading' && <span className="w-full text-[10px] font-bold text-blue-400 animate-pulse uppercase tracking-widest">Taranıyor...</span>}
                                {altLoginState === 'success' && <span className="w-full text-[10px] font-bold text-green-400 uppercase tracking-widest">Onaylandı: root</span>}
                                {altLoginState === 'error' && <span className="w-full text-[10px] font-bold text-red-500 uppercase tracking-widest">BAŞARISIZ!</span>}
                            </div>
                        </div>
                    )}

                    {view === 'dashboard' && (
                        <div className={`glass-panel slide-in-right sm:p-10 p-6 ${isOverload ? 'overload-panel' : ''} transition-all duration-700 w-full`}>
                            <div className="scan-bar-container"><div className={`scan-bar-indicator backdrop-blur-md ${isOverload ? 'bg-red-500/80 shadow-[0_0_15px_rgba(239,68,68,0.8)]' : 'bg-[#027AFF]/80 shadow-[0_0_15px_rgba(2,122,255,0.8)]'}`}></div></div>

                            {!showSettings ? (
                                <div>
                                    <div className="flex items-center justify-between mb-8 pb-4 border-b border-white/10 relative mt-2 gap-2">
                                        <div className="flex items-center gap-3">
                                            <h1 className="animated-title dashboard-title-effect text-xl sm:text-2xl mb-0">hizliyim.com</h1>
                                            <img src="./logo.png" alt="logo" className="w-8 h-8 logo-img" onError={(e) => { e.target.style.display='none'; }} />
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <button className="p-2 bg-black/30 border border-white/20 rounded-xl relative"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg><span className="absolute top-0 right-0 w-2.5 h-2.5 bg-[#027AFF] rounded-full animate-pulse border border-black"></span></button>
                                            <button onClick={() => setShowAccountMenu(!showAccountMenu)} className="p-2 bg-black/30 border border-white/20 rounded-xl"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
                                        </div>
                                    </div>

                                    {showAccountMenu && (
                                        <div className="absolute top-20 right-6 w-48 bg-black/80 backdrop-blur-xl border border-white/20 rounded-2xl p-2 z-50 animate-pop-in">
                                            <div className="p-3 border-b border-white/10 mb-1"><p className="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Yetki: ROOT</p><p className="text-sm font-bold">@hizliyimsystem</p></div>
                                            <button onClick={() => { setShowSettings(true); setShowAccountMenu(false); }} className="w-full text-left p-3 text-sm font-bold hover:bg-white/10 rounded-xl flex justify-between">Sistem Kontrolü <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
                                            <button onClick={() => window.location.reload()} className="w-full text-left p-3 text-sm font-bold hover:bg-red-500/20 text-red-400 rounded-xl flex justify-between">Güvenli Çıkış <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
                                        </div>
                                    )}

                                    <div className="text-center mb-8">
                                        {isOverload && <div className="flex items-center justify-center gap-2 mb-3 text-red-500 animate-pulse"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span className="font-black text-sm tracking-widest">SİSTEM OVERLOAD</span></div>}
                                        <p className="text-xs font-bold opacity-30 uppercase tracking-widest mb-2">Canlı Aktif Trafik</p>
                                        <div className={`text-6xl sm:text-7xl font-black italic tracking-tighter ${isOverload ? 'text-red-500 static-overload-glow' : 'text-white static-glow'}`}><AnimatedNumber value={activeUsers} /></div>
                                        <div className="w-full h-1.5 bg-black/40 rounded-full mt-8 overflow-hidden border border-white/5"><div className={`h-full transition-all duration-1000 ${isOverload ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${Math.min((activeUsers / 40000) * 100, 100)}%` }}></div></div>
                                    </div>

                                    <div className="space-y-4">
                                        <div className="bg-black/20 border border-white/10 p-4 rounded-2xl flex gap-4"><div className="text-blue-500 mt-1"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div><p className="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-1">Duyuru</p><p className="text-sm font-medium opacity-80 italic">"{announcement}"</p></div></div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-black/20 border border-white/10 p-4 rounded-xl"><p className="text-[10px] font-bold opacity-30 uppercase mb-1">CPU</p><p className="text-xl font-black italic text-white/90">%<AnimatedNumber value={cpu} decimals={1} /></p></div>
                                            <div className="bg-black/20 border border-white/10 p-4 rounded-xl"><p className="text-[10px] font-bold opacity-30 uppercase mb-1">RAM</p><p className="text-xl font-black italic text-white/90">%<AnimatedNumber value={ram} decimals={1} /></p></div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="animate-pop-in space-y-6">
                                    <div className="flex items-center justify-between border-b border-white/10 pb-4">
                                        <button onClick={() => setShowSettings(false)} className="text-xs font-bold opacity-40 hover:opacity-100 flex items-center gap-2 transition-all"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg> Geri Dön</button>
                                        <h3 className="text-xs font-black uppercase text-blue-400 italic">Sistem Kontrolü</h3>
                                    </div>
                                    <div className="grid grid-cols-2 sm:grid-cols-5 gap-2">
                                        <button onClick={() => applyMode(4000, 20, 25)} className="bg-white/5 border border-white/10 p-3 rounded-xl hover:bg-blue-500/20 text-[10px] font-black">MOD 1</button>
                                        <button onClick={() => applyMode(10500, 68, 75)} className="bg-white/5 border border-white/10 p-3 rounded-xl hover:bg-blue-500/20 text-[10px] font-black">MOD 2</button>
                                        <button onClick={() => applyMode(16000, 85, 90)} className="bg-white/5 border border-white/10 p-3 rounded-xl hover:bg-red-500/20 text-[10px] font-black">MOD 3</button>
                                        <button onClick={() => applyMode(20000, 95, 90)} className="bg-white/5 border border-white/10 p-3 rounded-xl hover:bg-red-600/30 text-[10px] font-black">MOD 4</button>
                                        <button onClick={() => applyMode(27000, 98, 95)} className="bg-white/5 border border-white/10 p-3 rounded-xl hover:bg-red-700/40 text-[10px] font-black sm:col-span-1 col-span-2">MOD 5</button>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="p-5 bg-black/20 rounded-2xl border border-white/5">
                                            <div className="flex justify-between text-xs font-bold mb-4"><span>Kullanıcı Sınırı</span> <span className="text-blue-400">{baseCount.toLocaleString()}</span></div>
                                            <input type="range" min="100" max="40000" value={baseCount} onChange={e => setBaseCount(Number(e.target.value))} className="w-full mb-4" />
                                            <div className="space-y-4 border-t border-white/10 pt-4">
                                                <div><div className="flex justify-between text-[10px] font-bold opacity-30 mb-2"><span>CPU</span> <span className="text-blue-400">%{baseCpu}</span></div><input type="range" min="1" max="99" value={baseCpu} onChange={e => setBaseCpu(Number(e.target.value))} className="w-full" /></div>
                                                <div><div className="flex justify-between text-[10px] font-bold opacity-30 mb-2"><span>RAM</span> <span className="text-blue-400">%{baseRam}</span></div><input type="range" min="1" max="99" value={baseRam} onChange={e => setBaseRam(Number(e.target.value))} className="w-full" /></div>
                                            </div>
                                        </div>
                                        <textarea className="w-full bg-black/20 border border-white/5 p-4 rounded-2xl text-sm italic h-24 outline-none focus:border-blue-500 transition-all" value={announcement} onChange={e => setAnnouncement(e.target.value)} placeholder="Duyuru metni..."></textarea>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    <div className="mt-10 flex justify-center opacity-40 hover:opacity-100 transition-all">
                        <div className="px-5 py-2.5 glass-panel rounded-2xl border border-white/10 text-[11px] font-medium tracking-widest lowercase">hizliyim systems - core v4.9.1</div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
