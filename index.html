<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hizliyimSystems-Yönetim</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React ve ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphism Sınıfları */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .glass-button {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.8) 0%, rgba(79, 70, 229, 0.8) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        
        /* Özel Shine Butonu */
        .shine-button {
            background: linear-gradient(to right, rgba(30, 58, 138, 0.5), rgba(0, 0, 0, 0.8));
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .shine-effect {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: skewX(-20deg);
            animation: shine-sweep 3s infinite ease-in-out;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -10px; 
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        /* SVG Snake Border Animation */
        .snake-border-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            border-radius: 2.5rem;
            overflow: visible;
        }
        
        .snake-border-rect {
            fill: none;
            stroke-width: 2px;
            stroke-linecap: round;
            stroke-dasharray: 300, 1000; 
            animation: snake-rotate 6s linear infinite;
        }
        
        .snake-border-rect.blue { stroke: url(#blue-gradient); }
        .snake-border-rect.red { stroke: #ef4444; filter: drop-shadow(0 0 5px rgba(239, 68, 68, 0.8)); }

        @keyframes snake-rotate {
            to { stroke-dashoffset: -1300; }
        }

        /* Animasyonlar */
        @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(5%, 5%) scale(1.1); } }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        @keyframes shine-sweep { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
        @keyframes page-enter {
            0% { opacity: 0; transform: scale(0.92); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        @keyframes neon-pulse {
            0%, 100% { filter: drop-shadow(0 0 2px rgba(59,130,246,0.4)); opacity: 0.9; }
            50% { filter: drop-shadow(0 0 15px rgba(59,130,246,0.9)) brightness(1.3); opacity: 1; }
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        @keyframes blink-red {
            0%, 100% { opacity: 1; color: #ef4444; }
            50% { opacity: 0.5; color: #fee2e2; }
        }
        @keyframes announcement-glow {
            0%, 100% { background-color: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.08); }
            50% { background-color: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3); box-shadow: 0 0 20px rgba(59,130,246,0.1); }
        }
        @keyframes dot-blink {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px rgba(255,255,255,0.8); }
        }

        .animate-float { animation: float 20s infinite ease-in-out; }
        .animate-shimmer { animation: shimmer 2s infinite linear; }
        .page-transition { animation: page-enter 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-neon { animation: neon-pulse 3s infinite ease-in-out; }
        .animate-scan { animation: scan 3s infinite linear; }
        .animate-blink { animation: blink-red 1s infinite; }
        .animate-announcement { animation: announcement-glow 4s infinite ease-in-out; }
        .animate-dot { animation: dot-blink 2s infinite ease-in-out; }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.6;
        }
    </style>
</head>
<body class="antialiased selection:bg-blue-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Zap: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Lock: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
            ArrowRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>,
            Bell: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,
            Activity: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>,
            CheckCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>,
            ShieldCheck: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="m9 12 2 2 4-4"></path></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>,
            Server: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>,
            Alert: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
            Eye: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7-10-7-10-7-10-7-10-7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>,
            MessageSquare: () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        };

        const Background = () => (
            <div className="fixed inset-0 overflow-hidden pointer-events-none">
                <div className="orb w-[500px] h-[500px] bg-blue-600 top-[-100px] left-[-100px] animate-float"></div>
                <div className="orb w-[400px] h-[400px] bg-purple-600 bottom-[-50px] right-[-50px] animate-float" style={{animationDelay: '-5s'}}></div>
                <div className="orb w-[300px] h-[300px] bg-indigo-500 top-[40%] left-[30%] animate-float" style={{animationDelay: '-10s'}}></div>
                <div className="absolute inset-0 bg-black/20 backdrop-blur-[2px]"></div>
                <div className="absolute inset-0 opacity-[0.05]" style={{backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E")`}}></div>
            </div>
        );

        const AnimatedCounter = ({ value, isOverload }) => {
            const [displayValue, setDisplayValue] = useState(value);
            useEffect(() => {
                let start = displayValue;
                let end = value;
                if (start === end) return;
                const duration = 1000; 
                const startTime = performance.now();
                const animate = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const easeOutQuart = 1 - Math.pow(1 - progress, 4);
                    const current = start + (end - start) * easeOutQuart;
                    setDisplayValue(current);
                    if (progress < 1) requestAnimationFrame(animate);
                };
                requestAnimationFrame(animate);
            }, [value]);

            return (
                <span className={`text-4xl sm:text-5xl font-black tracking-normal text-transparent bg-clip-text tabular-nums transition-colors duration-500 ${isOverload ? 'bg-gradient-to-b from-red-500 to-red-300' : 'bg-gradient-to-b from-white to-white/60'}`}>
                    {Math.round(displayValue).toLocaleString()}
                </span>
            );
        };

        const LoginScreen = ({ username, setUsername, password, setPassword, handleLogin, loading, error }) => (
            <div className="flex flex-col items-center justify-center min-h-screen p-4 relative z-10 page-transition">
                <div className="glass-panel w-full max-w-sm rounded-[3rem] p-8 md:p-12 relative overflow-hidden animate-border">
                    <div className="flex flex-col items-center mb-10 w-full">
                        <div className="w-20 h-20 glass-panel rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-blue-500/20 animate-neon">
                            <div className="text-white w-10 h-10"><Icons.Zap /></div>
                        </div>
                        <h1 className="text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white via-blue-100 to-white/50 italic pr-2 w-full text-center">
                            youtur
                        </h1>
                        <p className="text-blue-200/50 mt-2 text-[10px] font-black tracking-[0.6em] uppercase">systems v4.7</p>
                    </div>

                    <form onSubmit={handleLogin} className="space-y-5">
                        <div className="relative group">
                            <input type="text" className="glass-input w-full rounded-2xl py-4 pl-12 pr-4 text-white placeholder-white/30 outline-none focus:border-blue-500/50 transition-all duration-300" placeholder="Kullanıcı Adı" value={username} onChange={(e) => setUsername(e.target.value)} autoCapitalize="none" />
                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-white/40 group-focus-within:text-blue-400 transition-colors w-5 h-5"><Icons.User /></div>
                        </div>
                        <div className="relative group">
                            <input type="password" className="glass-input w-full rounded-2xl py-4 pl-12 pr-4 text-white placeholder-white/30 outline-none focus:border-blue-500/50 transition-all duration-300" placeholder="Şifre" value={password} onChange={(e) => setPassword(e.target.value)} />
                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-white/40 group-focus-within:text-blue-400 transition-colors w-5 h-5"><Icons.Lock /></div>
                        </div>
                        {error && <div className="glass-panel bg-red-500/10 border-red-500/20 rounded-xl p-3 text-center"><p className="text-red-300 text-xs font-bold">{error}</p></div>}
                        <button type="submit" disabled={loading} className="glass-button w-full py-4 rounded-2xl text-white font-black tracking-wider hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2">
                            {loading ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <>Sisteme Bağlan<div className="w-4 h-4"><Icons.ArrowRight /></div></>}
                        </button>
                    </form>
                </div>
            </div>
        );

        const DashboardScreen = ({ username, handleLogout, setView, activeUsers, announcement }) => {
            const isOverload = activeUsers > 6000;

            return (
                <div className="min-h-screen relative z-10 flex flex-col p-4 md:p-6 max-w-md mx-auto page-transition">
                    <header className="glass-panel rounded-[2rem] p-4 flex items-center justify-between mb-6">
                        <div className="flex items-center gap-3 pl-2">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/40 shrink-0 animate-neon">
                                <div className="w-5 h-5 text-white"><Icons.Zap /></div>
                            </div>
                            <div className="flex flex-col">
                                <span className="text-lg font-black italic leading-none tracking-tighter">hizliyim</span>
                                <span className="text-[8px] font-black uppercase tracking-[0.3em] text-blue-300/60">Systems</span>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button className="w-10 h-10 glass-input rounded-xl flex items-center justify-center relative hover:bg-white/10 transition-colors shrink-0">
                                <div className="w-5 h-5 text-white/70 flex items-center justify-center"><Icons.Bell /></div>
                                <span className={`absolute top-2 right-2 w-2 h-2 rounded-full border border-black ${isOverload ? 'bg-red-500 animate-ping' : 'bg-blue-500'}`}></span>
                            </button>
                            <button onClick={handleLogout} className="w-10 h-10 glass-input bg-red-500/10 border-red-500/20 rounded-xl flex items-center justify-center hover:bg-red-500/20 transition-colors shrink-0">
                                <div className="w-5 h-5 text-red-400 flex items-center justify-center"><Icons.LogOut /></div>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 flex flex-col gap-4">
                        {/* AKTİF KULLANICI KARTI */}
                        <div className={`glass-panel rounded-[2.5rem] p-1 relative overflow-hidden group transition-all duration-500 ${isOverload ? 'border-red-500/30 shadow-red-900/20' : ''}`}>
                            
                            <svg className="snake-border-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                                <defs>
                                    <linearGradient id="blue-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                        <stop offset="0%" stopColor="#3b82f6" stopOpacity="0" />
                                        <stop offset="50%" stopColor="#3b82f6" />
                                        <stop offset="100%" stopColor="#3b82f6" stopOpacity="0" />
                                    </linearGradient>
                                </defs>
                                <rect x="0" y="0" width="100" height="100" rx="12" ry="12" vectorEffect="non-scaling-stroke" className={`snake-border-rect ${isOverload ? 'red' : 'blue'}`} />
                            </svg>

                            <div className="bg-black/20 rounded-[2.3rem] p-6 relative overflow-hidden">
                                <div className="flex justify-between items-start mb-2">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center border shrink-0 transition-colors duration-500 ${isOverload ? 'bg-red-500/10 border-red-500/20' : 'bg-green-500/10 border-green-500/20'}`}>
                                            <div className={`w-5 h-5 animate-pulse ${isOverload ? 'text-red-400' : 'text-green-400'}`}><Icons.Activity /></div>
                                        </div>
                                        <div>
                                            <p className="text-[9px] font-black uppercase tracking-widest text-white/40">Canlı Trafik</p>
                                            {isOverload ? (
                                                <div className="flex flex-col">
                                                    <h2 className="font-bold text-sm text-red-400 animate-blink leading-tight">OVERLOAD</h2>
                                                    <p className="text-[8px] font-bold text-red-500/80 tracking-widest mt-0.5">CHECK SERVER</p>
                                                </div>
                                            ) : (
                                                <h2 className="font-bold text-sm text-white">Aktif Kullanıcı</h2>
                                            )}
                                        </div>
                                    </div>
                                    <div className={`flex items-center gap-2 px-3 py-1 glass-input rounded-full transition-colors duration-500 ${isOverload ? 'bg-red-500/20 border-red-500/30' : ''}`}>
                                        <div className={`w-1.5 h-1.5 rounded-full animate-pulse ${isOverload ? 'bg-red-500' : 'bg-green-500'}`}></div>
                                        <span className={`text-[9px] font-bold uppercase tracking-wide ${isOverload ? 'text-red-400' : 'text-green-400'}`}>
                                            {isOverload ? 'CRITICAL' : 'Online'}
                                        </span>
                                    </div>
                                </div>
                                <div className="mt-4 flex items-baseline gap-2 justify-center w-full px-2">
                                    <AnimatedCounter value={activeUsers} isOverload={isOverload} />
                                    <span className="text-sm font-bold text-white/30 shrink-0">/ 20k</span>
                                </div>
                                <div className="w-full h-1.5 bg-white/10 rounded-full mt-4 overflow-hidden">
                                    <div className={`h-full transition-all duration-1000 ease-out ${isOverload ? 'bg-gradient-to-r from-red-600 to-red-400' : 'bg-gradient-to-r from-blue-500 to-indigo-500'}`} style={{ width: `${Math.min(100, (activeUsers / 20000) * 100)}%` }}></div>
                                </div>
                            </div>
                        </div>

                        {/* DUYURU ALANI */}
                        <div className="glass-panel animate-announcement rounded-[2rem] p-5 relative overflow-hidden flex flex-col gap-3">
                            <div className="flex items-center gap-3">
                                <div className="w-2 h-2 rounded-full bg-white animate-dot shadow-[0_0_10px_white]"></div>
                                <h4 className="text-xs font-black uppercase tracking-widest text-blue-400">Canlı Duyuru</h4>
                            </div>
                            <div className="bg-black/20 p-4 rounded-xl border border-white/5">
                                <p className="text-sm font-medium text-white/90 leading-relaxed">
                                    {announcement}
                                </p>
                            </div>
                        </div>

                        <div className="glass-panel rounded-[2.5rem] p-8 text-center relative overflow-hidden">
                            <div className="absolute -right-10 -bottom-10 w-32 h-32 bg-blue-500/20 blur-[50px] rounded-full"></div>
                            <div className="w-14 h-14 mx-auto bg-blue-500/10 rounded-2xl flex items-center justify-center mb-4 border border-blue-500/20 shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                                <div className="w-7 h-7 text-blue-400"><Icons.CheckCircle /></div>
                            </div>
                            <h3 className="text-2xl font-black italic tracking-tighter text-white">Erişim Onaylı</h3>
                            <p className="text-white/30 text-xs font-medium mt-1">hizliyimSystems - Core v4.7</p>
                            <div className="grid grid-cols-2 gap-3 mt-6">
                                <div className="glass-input p-4 rounded-2xl relative overflow-hidden group">
                                    <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover:animate-shimmer"></div>
                                    <p className="text-[8px] font-black uppercase tracking-widest text-blue-300/50 mb-1">Durum</p>
                                    <p className="text-white font-black text-lg">AKTİF</p>
                                </div>
                                <div className="glass-input p-4 rounded-2xl relative overflow-hidden group">
                                    <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover:animate-shimmer"></div>
                                    <p className="text-[8px] font-black uppercase tracking-widest text-indigo-300/50 mb-1">Yetki</p>
                                    <p className="text-white font-black text-lg">ROOT</p>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col gap-2">
                            <button onClick={() => setView('profile')} className="glass-panel p-4 rounded-2xl flex items-center justify-between group hover:bg-white/5 transition-colors active:scale-[0.98] duration-200">
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg group-hover:scale-105 transition-transform shrink-0">
                                        <div className="w-6 h-6 text-white"><Icons.User /></div>
                                    </div>
                                    <div className="text-left">
                                        <h4 className="font-bold text-white">Profil Ayarları</h4>
                                        <p className="text-[10px] text-white/40">@{username}</p>
                                    </div>
                                </div>
                                <div className="w-8 h-8 rounded-full glass-input flex items-center justify-center group-hover:bg-white/10 shrink-0">
                                    <div className="w-4 h-4 text-white/50"><Icons.ArrowRight /></div>
                                </div>
                            </button>

                            <button onClick={() => setView('security')} className="glass-panel p-4 rounded-2xl flex items-center justify-between group hover:bg-white/5 transition-colors active:scale-[0.98] duration-200">
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center shadow-lg shrink-0 group-hover:scale-105 transition-transform">
                                        <div className="w-6 h-6 text-white"><Icons.ShieldCheck /></div>
                                    </div>
                                    <div className="text-left">
                                        <h4 className="font-bold text-white">Güvenlik Merkezi</h4>
                                        <p className="text-[10px] text-white/40">Durum: Güvenli</p>
                                    </div>
                                </div>
                                <div className="w-8 h-8 rounded-full glass-input flex items-center justify-center shrink-0">
                                    <div className="w-4 h-4 text-white/50"><Icons.ArrowRight /></div>
                                </div>
                            </button>
                        </div>
                    </main>
                </div>
            );
        };

        const SecurityScreen = ({ setView, activeUsers }) => {
            const capacityPercentage = Math.min(100, (activeUsers / 20000) * 100);
            return (
                <div className="min-h-screen relative z-10 flex flex-col p-6 max-w-md mx-auto page-transition">
                    <header className="flex items-center gap-4 mb-8">
                        <button onClick={() => setView('dashboard')} className="w-10 h-10 glass-panel rounded-xl flex items-center justify-center hover:bg-white/10 transition-colors shrink-0 active:scale-90 duration-200">
                            <div className="w-5 h-5 text-white"><Icons.ChevronLeft /></div>
                        </button>
                        <h2 className="text-2xl font-black italic tracking-tighter">Güvenlik</h2>
                    </header>
                    <div className="flex flex-col gap-6">
                        <div className="glass-panel rounded-[2.5rem] p-8 relative overflow-hidden">
                            <div className="absolute inset-0 z-0">
                                <div className="absolute w-full h-[50%] bg-gradient-to-b from-green-500/0 via-green-500/10 to-green-500/0 animate-scan"></div>
                            </div>
                            <div className="relative z-10 flex flex-col items-center text-center">
                                <div className="w-20 h-20 bg-green-500/10 rounded-full flex items-center justify-center border border-green-500/30 mb-4 shadow-[0_0_30px_rgba(34,197,94,0.2)]">
                                    <div className="w-10 h-10 text-green-400"><Icons.ShieldCheck /></div>
                                </div>
                                <h3 className="text-xl font-black text-white tracking-tight">Güvenlik Taraması</h3>
                                <div className="flex items-center gap-2 mt-2 px-3 py-1 bg-green-500/10 rounded-full border border-green-500/20">
                                    <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                    <span className="text-[10px] font-bold text-green-400 uppercase tracking-widest">AKTİF</span>
                                </div>
                            </div>
                        </div>
                        <div className="glass-panel rounded-[2rem] p-6 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center border border-white/10">
                                    <div className="w-6 h-6 text-white/70"><Icons.Alert /></div>
                                </div>
                                <div>
                                    <h4 className="font-bold text-white text-sm">Anlık Sorunlar</h4>
                                    <p className="text-[10px] text-white/40">Sistem Bütünlüğü</p>
                                </div>
                            </div>
                            <span className="text-green-400 font-black text-sm tracking-wide">TEMİZ</span>
                        </div>
                        <div className="glass-panel rounded-[2.5rem] p-6">
                            <div className="flex items-center justify-between mb-6">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-indigo-500/10 rounded-xl flex items-center justify-center border border-indigo-500/20">
                                        <div className="w-5 h-5 text-indigo-400"><Icons.Server /></div>
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-white text-sm">Sunucu Kapasitesi</h4>
                                        <p className="text-[10px] text-white/40">Load Balance</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <span className={`text-xl font-black ${capacityPercentage > 85 ? 'text-red-400 animate-pulse' : 'text-white'}`}>%{Math.round(capacityPercentage)}</span>
                                </div>
                            </div>
                            <div className="space-y-4">
                                <div className="relative pt-6">
                                    <div className="flex justify-between text-[9px] font-bold text-white/30 uppercase mb-1 tracking-wider">
                                        <span>Normal</span>
                                        <span className="text-red-400/60">Limit (20k)</span>
                                    </div>
                                    <div className="w-full h-3 bg-black/40 rounded-full overflow-hidden relative">
                                        <div className="absolute top-0 bottom-0 right-[15%] w-[2px] bg-red-500/30 z-10"></div>
                                        <div className={`h-full rounded-full transition-all duration-1000 ${capacityPercentage > 85 ? 'bg-gradient-to-r from-red-600 to-red-400' : 'bg-gradient-to-r from-blue-500 to-indigo-500'}`} style={{ width: `${Math.min(100, capacityPercentage)}%` }}></div>
                                    </div>
                                    <div className="w-full h-[1px] bg-white/10 mt-1 overflow-hidden">
                                         <div className="h-full w-1/3 bg-white/30 animate-shimmer"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ProfileScreen = ({ username, setView, baseUserCount, setBaseUserCount, announcement, setAnnouncement }) => {
            const [showPrivate, setShowPrivate] = useState(false);

            return (
                <div className="min-h-screen relative z-10 flex flex-col p-6 max-w-md mx-auto page-transition">
                    <header className="flex items-center gap-4 mb-8">
                        <button onClick={() => setView('dashboard')} className="w-10 h-10 glass-panel rounded-xl flex items-center justify-center hover:bg-white/10 transition-colors shrink-0 active:scale-90 duration-200">
                            <div className="w-5 h-5 text-white"><Icons.ChevronLeft /></div>
                        </button>
                        <h2 className="text-2xl font-black italic tracking-tighter">Profil</h2>
                    </header>

                    <div className="glass-panel rounded-[3rem] p-8 flex flex-col items-center text-center relative overflow-hidden transition-all duration-500">
                        <div className="w-32 h-32 rounded-full p-[2px] bg-gradient-to-b from-white/50 to-transparent mb-6 shadow-[0_0_50px_rgba(255,255,255,0.1)]">
                            <div className="w-full h-full rounded-full bg-black flex items-center justify-center relative overflow-hidden group">
                                <div className="absolute inset-0 bg-gradient-to-tr from-gray-900 to-black"></div>
                                <div className="absolute inset-0 bg-blue-500/10 animate-pulse"></div>
                                <div className="relative z-10 flex flex-col items-center justify-center">
                                    <span className="text-3xl font-black text-white tracking-tighter italic" style={{textShadow: '0 0 10px rgba(255,255,255,0.5)'}}>ROOT</span>
                                    <div className="w-8 h-[2px] bg-blue-500 mt-1 shadow-[0_0_5px_#3b82f6]"></div>
                                </div>
                            </div>
                        </div>

                        <h3 className="text-3xl font-black italic tracking-tighter">{username}</h3>
                        <div className="mt-2 px-4 py-1.5 glass-input rounded-full border border-blue-500/30">
                            <span className="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400">Yönetici</span>
                        </div>

                        <div className="w-full mt-8 flex flex-col gap-3">
                            <div className="glass-input p-4 rounded-2xl flex justify-between items-center">
                                <span className="text-[10px] font-bold uppercase tracking-widest text-white/40">ID</span>
                                <span className="font-mono text-xs bg-white/5 px-2 py-1 rounded">#hizliyim-047</span>
                            </div>
                            
                            <div className="mt-4">
                                <button onClick={() => setShowPrivate(!showPrivate)} className={`shine-button w-full p-4 rounded-2xl flex justify-between items-center transition-all duration-300 transform active:scale-[0.98] ${showPrivate ? 'border-blue-400 shadow-[0_0_20px_rgba(37,99,235,0.4)]' : ''}`}>
                                    <div className="shine-effect"></div>
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-white/90 flex items-center gap-2 relative z-10">
                                        <div className="w-4 h-4"><Icons.Eye /></div>
                                        Private Zone
                                    </span>
                                    <span className={`font-bold text-xs relative z-10 ${showPrivate ? 'text-blue-300' : 'text-white/60'}`}>
                                        {showPrivate ? 'AÇIK' : 'GİZLİ'}
                                    </span>
                                </button>
                            </div>

                            {showPrivate && (
                                <div className="glass-panel p-6 rounded-2xl mt-2 animate-scan border-blue-500/20 flex flex-col gap-5">
                                    <div>
                                        <div className="flex justify-between items-center mb-4">
                                            <span className="text-xs font-bold text-white">Trafik Kontrolü</span>
                                            <span className="text-xs font-mono text-blue-400">{baseUserCount.toLocaleString()}</span>
                                        </div>
                                        <input type="range" min="0" max="20000" step="100" value={baseUserCount} onChange={(e) => setBaseUserCount(Number(e.target.value))} className="w-full" />
                                        <div className="flex justify-between mt-2 text-[9px] text-white/30 font-bold uppercase tracking-widest">
                                            <span>0</span>
                                            <span className="text-blue-400">Boost Mode</span>
                                            <span>20k</span>
                                        </div>
                                    </div>

                                    <div>
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-xs font-bold text-white">Canlı Duyuru Metni</span>
                                            <div className="w-3 h-3 text-blue-400"><Icons.MessageSquare /></div>
                                        </div>
                                        <textarea 
                                            value={announcement}
                                            onChange={(e) => setAnnouncement(e.target.value)}
                                            className="glass-input w-full rounded-xl p-3 text-xs text-white placeholder-white/20 focus:outline-none focus:border-blue-500/50 transition-all h-20 resize-none"
                                            placeholder="Duyuru metnini buraya yaz..."
                                        />
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('login');
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [baseUserCount, setBaseUserCount] = useState(4200);
            const [activeUsers, setActiveUsers] = useState(4200);
            const [announcement, setAnnouncement] = useState("Sistem güncellemeleri başarıyla tamamlandı. %100 Performans ile hizmetinizdeyiz.");

            useEffect(() => {
                const interval = setInterval(() => {
                    setActiveUsers(prev => {
                        const noise = Math.floor(Math.random() * 101) - 50; 
                        let next = baseUserCount + noise;
                        if (next < 0) next = 0;
                        if (next > 20000) next = 20000;
                        return next;
                    });
                }, 2000); 
                return () => clearInterval(interval);
            }, [baseUserCount]);

            const handleLogin = (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                setTimeout(() => {
                    if (username === 'root' && password === 'iremim') {
                        setView('dashboard');
                    } else {
                        setError('Erişim Reddedildi!');
                    }
                    setLoading(false);
                }, 1500);
            };

            const handleLogout = () => {
                setView('login');
                setUsername('');
                setPassword('');
            };

            return (
                <>
                    <Background />
                    {view === 'login' && <LoginScreen username={username} setUsername={setUsername} password={password} setPassword={setPassword} handleLogin={handleLogin} loading={loading} error={error} />}
                    {view === 'dashboard' && <DashboardScreen username={username} handleLogout={handleLogout} setView={setView} activeUsers={activeUsers} announcement={announcement} />}
                    {view === 'profile' && <ProfileScreen username={username} setView={setView} baseUserCount={baseUserCount} setBaseUserCount={setBaseUserCount} announcement={announcement} setAnnouncement={setAnnouncement} />}
                    {view === 'security' && <SecurityScreen setView={setView} activeUsers={activeUsers} />}
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
